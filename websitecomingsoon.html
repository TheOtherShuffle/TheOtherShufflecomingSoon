<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Other Shuffle</title>

<!-- Font Awesome for social icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

/* Fullscreen video */

.video-container{
    position:fixed;
    inset:0;
    overflow:hidden;
}

.video-container video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Bottom gradient */

.bottom-overlay{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    height:140px;
    background:linear-gradient(to top,
    rgba(0,0,0,.45),
    transparent);
    pointer-events:none;
}

/* Social links */

.social-links{
    position:fixed;
    bottom:28px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:40px;
    z-index:10;
}

.social-links a{
    color:#E9C17B;
    font-size:34px;
    transition:.3s ease;
}

.social-links a:hover{
    color:#f6d69b;
    transform:scale(1.15);
}

/* Mobile */

@media (max-width:768px){

.social-links{
    bottom:22px;
    gap:30px;
}

.social-links a{
    font-size:30px;
}

}

</style>

</head>

<body>

<div class="video-container">

<video autoplay muted loop playsinline>
    <source src="C:\Users\Shane\Videos\The Other Shuffle\website coming soon video.mp4" type="video/mp4">
</video>

</div>

<div class="bottom-overlay"></div>

<div class="social-links">

<a href="https://www.instagram.com/theothershuffle/"
target="_blank"
aria-label="Instagram">

<i class="fab fa-instagram"></i>

</a>

<a href="https://www.youtube.com/@TheOtherShuffle"
target="_blank"
aria-label="YouTube">

<i class="fab fa-youtube"></i>

</a>

</div>

</body>
</html>
